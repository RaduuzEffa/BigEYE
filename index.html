<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#E55C3E">
    <title>Big EYE - Video Analysis</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="BigEYE.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- Include Phosphor Icons for premium UI icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body>
    <div class="app-container">
        <!-- Hlavní hlavička s logem přes všechny sloupce -->
        <header class="top-bar">
            <div style="display: flex; align-items: center; gap: 12px;">
                <img src="BigEYE.png" alt="Big EYE Logo" style="height: 38px; width: auto; object-fit: contain; border-radius: 8px;">
                <h1 class="gradient-text">Big EYE</h1>
            </div>
        </header>

        <!-- Levý panel: Průzkumník a Kamera -->
        <aside class="sidebar left-sidebar" style="display: flex; flex-direction: column;">
            <!-- Camera Section (Top) -->
            <div class="camera-section" style="padding: 15px; border-bottom: 1px solid var(--border-color);">
                <div class="camera-controls">
                    <label for="camera-select" class="control-label" style="margin-bottom: 5px; display: block;">Zdroj videa:</label>
                    <select id="camera-select" class="camera-select" style="width: 100%; margin-bottom: 10px;">
                        <option value="">Hledám kamery...</option>
                    </select>
                    
                    <div class="recording-settings hidden" style="margin-bottom: 15px; display: none;">
                        <label for="chunk-length" class="control-label" style="margin-bottom: 5px; display: block;">Délka segmentu (min):</label>
                        <input type="number" id="chunk-length" value="5" min="1" max="60" class="num-input" style="width: 100%;">
                    </div>

                    <button id="btn-start-record" class="btn primary-btn record-btn" style="width: 100%; justify-content: center;">
                        <i class="ph ph-record"></i> Začít nahrávat
                    </button>
                    <button id="btn-stop-record" class="btn danger-btn record-btn" style="display: none; width: 100%; justify-content: center;">
                        <i class="ph ph-stop-circle"></i> Ukončit nahrávání
                    </button>
                    <div id="recording-status" class="recording-status hidden" style="margin-top: 10px;">
                        <span class="pulse-dot"></span> Nahrávání... (<span id="rec-time">00:00</span>)
                    </div>
                </div>
            </div>
            
            <!-- Explorer Section (Bottom) -->
            <div class="explorer-section" style="flex: 1; display: flex; flex-direction: column; overflow: hidden;">
                <input type="file" id="folder-input" webkitdirectory directory style="display: none;">
                <input type="file" id="file-input" multiple accept="video/*" style="display: none;">
                
                <div class="file-tree" id="file-tree" style="flex: 1; overflow-y: auto; padding: 15px;">
                    <div class="empty-state" id="empty-tree-state" style="cursor: pointer; transition: transform 0.2s;" onmouseover="this.style.transform='scale(1.05)'" onmouseout="this.style.transform='scale(1)'">
                        <i class="ph ph-folder-open" style="color: var(--accent-primary);"></i>
                        <p>Kliknutím sem načtete celou složku s videi</p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Střední panel: Video Přehrávač -->
        <main class="main-content">
            <div class="analysis-box" id="analysis-box">
                <div class="drop-zone" id="drop-zone">
                    <div class="drop-content">
                        <i class="ph ph-download-simple"></i>
                        <h3>Přetáhněte video sem</h3>
                        <p>Z levého panelu nebo z počítače</p>
                    </div>
                </div>
                
                <div class="player-container hidden" id="player-container">
                    <!-- Standardní prohlížečové ovládání pro 100% funkčnost -->
                    <video id="main-player" controls playsinline></video>
                    
                    <!-- Kreslící plátno (aktivní pouze přes tlačítko Kreslit) -->
                    <canvas id="drawing-canvas" class="drawing-layer" style="pointer-events: none;"></canvas>
                    
                    <!-- Overlay pro nástroje kreslení ve fullscreenu -->
                    <div id="fullscreen-drawing-tools" class="fullscreen-tools hidden"></div>
                    
                    <!-- Vizuální směrové šipky (viditelné i ve fullscreenu) -->
                    <div class="on-screen-arrows" id="on-screen-arrows">
                        <div class="arrow-row">
                            <button class="arrow-btn" data-dir="up"><i class="ph ph-caret-up"></i></button>
                        </div>
                        <div class="arrow-row">
                            <button class="arrow-btn" data-dir="left"><i class="ph ph-caret-left"></i></button>
                            <button class="arrow-btn" data-dir="down"><i class="ph ph-caret-down"></i></button>
                            <button class="arrow-btn" data-dir="right"><i class="ph ph-caret-right"></i></button>
                        </div>
                    </div>

                    <!-- Náhled kamery -->
                    <video id="camera-preview" autoplay muted playsinline class="hidden"></video>
                </div>
            </div>

            <!-- Dolní panel: Fronta přehrávání -->
            <div class="playlist-container" id="playlist-container">
                <div class="playlist-header">
                    <h3><i class="ph ph-list-video"></i> Fronta přehrávání</h3>
                    <button class="btn outline-btn" onclick="document.getElementById('playlist-items').innerHTML=''; state.activeQueue=[];" style="font-size: 0.75rem; padding: 4px 8px;">
                        <i class="ph ph-trash"></i> Vyčistit
                    </button>
                </div>
                <div class="playlist-items" id="playlist-items">
                    <!-- Videa z drag&drop -->
                </div>
            </div>
        </main>

        <!-- Pravý panel: Nástroje a Kreslení -->
        <aside class="sidebar right-sidebar">
            <div class="settings-section" id="right-sidebar-tools-container" style="border-bottom: none;">
                <h3 style="margin-bottom: 25px;">Nástroje kreslení</h3>
                <button id="btn-toggle-draw" class="btn outline-btn" style="width: 100%; margin-bottom: 25px; padding: 12px; border-color: var(--accent-primary); color: var(--accent-primary); font-size: 0.95rem;">
                    <i class="ph ph-pencil"></i> Režim kreslení (Vypnuto)
                </button>
                <div id="drawing-tools-wrapper">
                    <div class="color-picker" id="color-picker" style="display: flex; gap: 8px; margin-bottom: 25px;">
                        <button class="color-btn active" data-color="#ef4444" style="background: #ef4444; width: 32px; height: 32px;"></button>
                        <button class="color-btn" data-color="#eab308" style="background: #eab308; width: 32px; height: 32px;"></button>
                        <button class="color-btn" data-color="#10b981" style="background: #10b981; width: 32px; height: 32px;"></button>
                        <button class="color-btn" data-color="#3b82f6" style="background: #3b82f6; width: 32px; height: 32px;"></button>
                        <button class="color-btn" data-color="#ffffff" style="background: #ffffff; width: 32px; height: 32px;"></button>
                    </div>
                    
                    <div class="tool-picker" id="tool-picker" style="display: flex; gap: 10px; margin-bottom: 30px;">
                        <button class="btn outline-btn tool-btn active" data-tool="free" title="Křivka" style="padding: 10px;"><i class="ph ph-pencil-simple" style="font-size: 1.2rem;"></i></button>
                        <button class="btn outline-btn tool-btn" data-tool="rect" title="Obdélník" style="padding: 10px;"><i class="ph ph-rectangle" style="font-size: 1.2rem;"></i></button>
                        <button class="btn outline-btn tool-btn" data-tool="square" title="Čtverec" style="padding: 10px;"><i class="ph ph-square" style="font-size: 1.2rem;"></i></button>
                        <button class="btn outline-btn tool-btn" data-tool="ellipse" title="Elipsa" style="padding: 10px;"><i class="ph ph-circle-dashed" style="font-size: 1.2rem;"></i></button>
                        <button class="btn outline-btn tool-btn" data-tool="circle" title="Kruh" style="padding: 10px;"><i class="ph ph-circle" style="font-size: 1.2rem;"></i></button>
                    </div>
                    
                    <div class="drawing-options" style="display: flex; gap: 20px; margin-bottom: 30px; justify-content: center;">
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 0.95rem; cursor: pointer; color: white;">
                            <input type="radio" name="draw-mode" value="stroke" checked> Obrys
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 0.95rem; cursor: pointer; color: white;">
                            <input type="radio" name="draw-mode" value="fill"> Výplň (33%)
                        </label>
                    </div>
                    
                    <button id="btn-clear-canvas" class="btn outline-btn" style="width: 100%; padding: 12px; font-size: 0.95rem; color: #ef4444; border-color: rgba(239, 68, 68, 0.4);"><i class="ph ph-eraser"></i> Smazat kresbu</button>
                </div>
            </div>

            <!-- Rychlost přehrávání - připnutá dolů -->
            <div class="settings-section" style="margin-top: auto; border-top: 1px solid var(--border-color); border-bottom: none; height: 160px; display: flex; flex-direction: column; justify-content: center;">
                <h3 style="margin-bottom: 20px;">Rychlost přehrávání</h3>
                <div class="speed-controls" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                    <button class="btn outline-btn speed-btn" data-speed="0.25" style="padding: 10px;">0.25x</button>
                    <button class="btn outline-btn speed-btn" data-speed="0.5" style="padding: 10px;">0.5x</button>
                    <button class="btn outline-btn speed-btn active" data-speed="1" style="padding: 10px;">1x</button>
                    <button class="btn outline-btn speed-btn" data-speed="3" style="padding: 10px;">3x</button>
                </div>
            </div>
        </aside>
    </div>

    <script src="js/app.js"></script>
    <script src="js/recorder.js"></script>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((reg) => console.log('Service Worker registered', reg))
                    .catch((err) => console.log('Service Worker registration failed', err));
            });
        }
    </script>
</body>
</html>
